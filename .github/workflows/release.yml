name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux musl / aarch64)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Set up cross-compilation env (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p asat

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/asat
          NAME=asat-${{ github.ref_name }}-${{ matrix.target }}
          mkdir -p dist/$NAME
          cp $BIN dist/$NAME/
          cp README.md LICENSE dist/$NAME/
          tar -czf dist/$NAME.tar.gz -C dist $NAME
          echo "ASSET=dist/$NAME.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN = "target\${{ matrix.target }}\release\asat.exe"
          $NAME = "asat-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force dist/$NAME
          Copy-Item $BIN dist/$NAME/
          Copy-Item README.md, LICENSE dist/$NAME/
          Compress-Archive -Path dist/$NAME -DestinationPath dist/$NAME.zip
          echo "ASSET=dist/$NAME.zip" | Out-File -Append $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  deb:
    name: Build .deb package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build .deb
        run: cargo deb --locked -p asat
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: target/debian/*.deb

  release:
    name: Create GitHub Release
    needs: [build, deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: '*'

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
          body: |
            ## Installation

            ### Linux / macOS — download binary
            ```bash
            # Linux x86_64 (glibc)
            curl -L https://github.com/okt4v/ASAT/releases/download/${{ github.ref_name }}/asat-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz | tar xz
            sudo mv asat-${{ github.ref_name }}-x86_64-unknown-linux-gnu/asat /usr/local/bin/

            # macOS Apple Silicon
            curl -L https://github.com/okt4v/ASAT/releases/download/${{ github.ref_name }}/asat-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz | tar xz
            sudo mv asat-${{ github.ref_name }}-aarch64-apple-darwin/asat /usr/local/bin/
            ```

            ### Arch Linux (AUR)
            ```bash
            yay -S asat-bin
            ```

            ### Homebrew
            ```bash
            brew tap okt4v/tap && brew install asat
            ```

            ### Build from source
            ```bash
            cargo install --git https://github.com/okt4v/ASAT --bin asat
            ```

  # ── Update AUR ──────────────────────────────────────────────────────────────
  update-aur:
    name: Update AUR package
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download SHA256SUMS
        run: |
          gh release download ${{ github.ref_name }} --repo okt4v/ASAT --pattern SHA256SUMS.txt -D /tmp/sums
          cat /tmp/sums/SHA256SUMS.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract x86_64 linux SHA256
        run: |
          SHA=$(grep "x86_64-unknown-linux-gnu.tar.gz" /tmp/sums/SHA256SUMS.txt | awk '{print $1}')
          echo "SHA256=$SHA" >> $GITHUB_ENV
          VERSION=${{ github.ref_name }}
          echo "PKGVER=${VERSION#v}" >> $GITHUB_ENV

      - name: Write PKGBUILD
        run: |
          cat > /tmp/PKGBUILD <<'PKGEOF'
          # Maintainer: okt4v
          pkgname=asat-bin
          pkgver=PKGVER_PLACEHOLDER
          pkgrel=1
          pkgdesc="Terminal spreadsheet editor for Vim users — modal editing, 40+ formulas, CSV/XLSX/ODS"
          arch=('x86_64')
          url="https://github.com/okt4v/ASAT"
          license=('GPL-3.0-or-later')
          provides=('asat')
          conflicts=('asat' 'asat-git')
          source_x86_64=("${pkgname}-${pkgver}-x86_64.tar.gz::https://github.com/okt4v/ASAT/releases/download/v${pkgver}/asat-v${pkgver}-x86_64-unknown-linux-gnu.tar.gz")
          sha256sums_x86_64=('SHA256_PLACEHOLDER')

          package() {
              install -Dm755 "asat-v${pkgver}-x86_64-unknown-linux-gnu/asat" "${pkgdir}/usr/bin/asat"
              install -Dm644 "asat-v${pkgver}-x86_64-unknown-linux-gnu/README.md" \
                  "${pkgdir}/usr/share/doc/${pkgname}/README.md"
          }
          PKGEOF
          sed -i "s/PKGVER_PLACEHOLDER/${PKGVER}/" /tmp/PKGBUILD
          sed -i "s/SHA256_PLACEHOLDER/${SHA256}/" /tmp/PKGBUILD

      - name: Set up SSH for AUR
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_KEY }}

      - name: Add AUR to known hosts
        run: ssh-keyscan aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Push to AUR
        run: |
          git clone ssh://aur@aur.archlinux.org/asat-bin.git /tmp/aur-asat-bin
          cp /tmp/PKGBUILD /tmp/aur-asat-bin/PKGBUILD
          cd /tmp/aur-asat-bin
          docker run --rm -v "$PWD:/pkg" archlinux:latest bash -c \
            "pacman -Sy --noconfirm base-devel && cd /pkg && HOME=/tmp makepkg --printsrcinfo > .SRCINFO"
          git config user.name "okt4v"
          git config user.email "aur@asat"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || git commit -m "Update to ${{ github.ref_name }}"
          git push origin master

  # ── Update Homebrew tap ──────────────────────────────────────────────────────
  update-homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download SHA256SUMS
        run: |
          gh release download ${{ github.ref_name }} --repo okt4v/ASAT --pattern SHA256SUMS.txt -D /tmp/sums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract SHA256s and write formula
        run: |
          SUMS=/tmp/sums/SHA256SUMS.txt
          VERSION=${{ github.ref_name }}
          VER=${VERSION#v}

          SHA_MACOS_ARM=$(grep "aarch64-apple-darwin.tar.gz" $SUMS | awk '{print $1}')
          SHA_MACOS_X86=$(grep "x86_64-apple-darwin.tar.gz"  $SUMS | awk '{print $1}')
          SHA_LINUX_ARM=$(grep "aarch64-unknown-linux-gnu.tar.gz" $SUMS | awk '{print $1}')
          SHA_LINUX_X86=$(grep "x86_64-unknown-linux-gnu.tar.gz"  $SUMS | awk '{print $1}')

          mkdir -p /tmp/homebrew-tap
          cat > /tmp/homebrew-tap/asat.rb <<EOF
          class Asat < Formula
            desc "Terminal spreadsheet editor for Vim users — modal editing, 40+ formulas, CSV/XLSX/ODS"
            homepage "https://okt4v.github.io/ASAT/"
            license "GPL-3.0-or-later"
            version "${VER}"

            on_macos do
              on_arm do
                url "https://github.com/okt4v/ASAT/releases/download/v#{version}/asat-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_ARM}"
              end
              on_intel do
                url "https://github.com/okt4v/ASAT/releases/download/v#{version}/asat-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_MACOS_X86}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/okt4v/ASAT/releases/download/v#{version}/asat-v#{version}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_ARM}"
              end
              on_intel do
                url "https://github.com/okt4v/ASAT/releases/download/v#{version}/asat-v#{version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${SHA_LINUX_X86}"
              end
            end

            def install
              bin.install "asat"
            end

            test do
              system "#{bin}/asat", "--version"
            end
          end
          EOF

      - name: Push to homebrew-tap
        run: |
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/okt4v/homebrew-tap.git /tmp/homebrew-tap-repo
          cp /tmp/homebrew-tap/asat.rb /tmp/homebrew-tap-repo/asat.rb
          cd /tmp/homebrew-tap-repo
          git config user.name "okt4v"
          git config user.email "bot@asat"
          git add asat.rb
          git diff --cached --quiet || git commit -m "Update asat to ${{ github.ref_name }}"
          git push origin main

  # ── Update Buildkite apt registry ────────────────────────────────────────────
  update-apt:
    name: Upload .deb to Buildkite
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download .deb from release
        run: |
          gh release download ${{ github.ref_name }} --repo okt4v/ASAT --pattern "*.deb" -D /tmp/deb
          DEB=$(ls /tmp/deb/*.deb)
          echo "DEB_PATH=$DEB" >> $GITHUB_ENV
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to Buildkite registry
        run: |
          curl -sf -X POST \
            "https://api.buildkite.com/v2/packages/organizations/oktavian-m/registries/asat/packages" \
            -H "Authorization: Bearer ${{ secrets.BUILDKITE_API_TOKEN }}" \
            -F "file=@${DEB_PATH}"
