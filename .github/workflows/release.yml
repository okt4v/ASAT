name: Release

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux musl / aarch64)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Set up cross-compilation env (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }} -p asat

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/asat
          NAME=asat-${{ github.ref_name }}-${{ matrix.target }}
          mkdir -p dist/$NAME
          cp $BIN dist/$NAME/
          cp README.md LICENSE dist/$NAME/
          tar -czf dist/$NAME.tar.gz -C dist $NAME
          echo "ASSET=dist/$NAME.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $BIN = "target\${{ matrix.target }}\release\asat.exe"
          $NAME = "asat-${{ github.ref_name }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Force dist/$NAME
          Copy-Item $BIN dist/$NAME/
          Copy-Item README.md, LICENSE dist/$NAME/
          Compress-Archive -Path dist/$NAME -DestinationPath dist/$NAME.zip
          echo "ASSET=dist/$NAME.zip" | Out-File -Append $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  deb:
    name: Build .deb package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Build .deb
        run: cargo deb --locked -p asat
      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: target/debian/*.deb

  release:
    name: Create GitHub Release
    needs: [build, deb]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          pattern: '*'

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
          generate_release_notes: true
          body: |
            ## Installation

            ### Linux / macOS — download binary
            ```bash
            # Linux x86_64 (glibc)
            curl -L https://github.com/okt4v/ASAT/releases/download/${{ github.ref_name }}/asat-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz | tar xz
            sudo mv asat-${{ github.ref_name }}-x86_64-unknown-linux-gnu/asat /usr/local/bin/

            # macOS Apple Silicon
            curl -L https://github.com/okt4v/ASAT/releases/download/${{ github.ref_name }}/asat-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz | tar xz
            sudo mv asat-${{ github.ref_name }}-aarch64-apple-darwin/asat /usr/local/bin/
            ```

            ### Arch Linux (AUR)
            ```bash
            yay -S asat-bin
            ```

            ### Build from source
            ```bash
            cargo install --git https://github.com/okt4v/ASAT --bin asat
            ```
